services:
  - type: web
    name: survey-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install prisma@5.22.0 @prisma/client@5.22.0 --save-exact --legacy-peer-deps && npm install --legacy-peer-deps && npx prisma@5.22.0 generate && npm run build
    startCommand: npx prisma@5.22.0 migrate deploy && npm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: HOLD_EXPIRY_MINUTES
        value: 30
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
